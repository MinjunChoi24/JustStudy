name: Run Telegram Bot Notebook

on:
  schedule:
    # 한국 시간(KST) 금요일 오후 3시 40분 (UTC 오전 6시 40분)
    - cron: '40 6 * * 5'
  workflow_dispatch: 

jobs:
  run-notebook:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          # papermill을 사용해 실행만 하고 결과 파일은 임시로 생성(저장 안 됨)
          papermill news-archiver/telegramBot.ipynb /dev/null